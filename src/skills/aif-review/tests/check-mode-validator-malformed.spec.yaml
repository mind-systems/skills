# spec-only fixture (.spec.yaml): describes the contract for a future
# runner. No existing runner consumes this file, so a green CI does not
# prove the +check branches below executed.

scenario: check-mode-validator-malformed
description: |
  With `+check` enabled and the Task tool available, but with the
  validator returning a per-item malformed response (heading missing,
  no `Verdict` line, unknown verdict token, unknown `Severity` value,
  or missing `Modified-text` when `Verdict` is `modify`), `/aif-review`
  must take the per-item-malformed branch of the procedure described in
  skills/aif-review/references/CHECK-MODE.md (distinct from the
  whole-dispatch failure path covered by
  check-mode-validator-failure.spec.yaml):

    1. Dispatch the validator exactly once (the dispatch itself
       succeeds — the failure is per-item, not at the dispatch level).
    2. Parse the response by `### Item N` headings. For every
       well-formed item, apply `Verdict` and `Severity` normally
       (drops/modifies/reclassifications take effect).
    3. For every malformed item, treat it as `Verdict: keep` with
       `Severity: unchanged` and emit ONE line of the exact form
       `WARN [+check]: validator response for item N was malformed,
       kept as-is` AFTER all review sections and ABOVE the
       `aif-gate-result` fence. Continue processing remaining items.
    4. Emit the
       `Filtered: N hidden, M adjusted, K reclassified by +check`
       summary normally — only the malformed item(s) are forced to
       `keep`. This is NOT the whole-dispatch failure path; do NOT
       emit `validator failed` here.
    5. Recompute `aif-gate-result` from the post-filter findings as in
       the happy path — the per-item malformed branch does NOT switch
       back to the unfiltered original list.

  Runner contract: the validator response must be partially malformed
  for this fixture to exercise its branch. The runner is expected to
  inject a mocked Task subagent response where at least one
  `### Item N` block lacks a required field (e.g., omit `Verdict:`)
  and at least one other block is well-formed, so both code paths
  (well-formed item filtered, malformed item kept-with-WARN) are
  exercised in a single run.

  Spec extension: like check-mode-happy-path.spec.yaml and
  check-mode-validator-failure.spec.yaml, this fixture uses a `files_staged:`
  block (parallel to `files_committed:`) so that `git diff --cached`
  produces non-empty input for the no-arguments staged-mode review.
  No existing runner consumes this field today; introducing it is part
  of the contract this fixture documents.

  Fixture state mirrors check-mode-happy-path.spec.yaml — same baseline
  commit + same staged diff. Only the validator response shape differs.

  Runner requirements (checklist for the future runner — same items
  are spelled out in prose above):
    - Handle `files_staged:`: write each path to disk AND `git add` it
      before invoking the skill, so `git diff --cached` is non-empty.
    - Support mock injection for the dispatched subagent response — at
      least one `### Item N` block must be returned malformed (missing
      `Verdict:` / unknown verdict token / unknown `Severity` value /
      missing `Modified-text` when `Verdict` is `modify`) AND at least
      one other block must be well-formed, so both code paths
      (well-formed item filtered, malformed item kept-with-WARN) run
      in a single dispatch.
skill: aif-review
argument: "+check"
max_turns: 50

runner:
  model: claude-sonnet-4-6
  permission_mode: bypassPermissions
  allowed_tools_override:
    - Read
    - Glob
    - Grep
    - Bash(git *)
    - Bash(gh *)
    - Bash(pwd)
    - Bash(basename *)
    - Bash(cd *)
    - Bash(printenv *)
    - Task
    - Agent
    - AskUserQuestion
    - Questions

fixtures:
  git_init: true
  git_branch: main
  files_committed:
    - path: README.md
      content: |
        # Demo repo

        Fixture for /aif-review +check per-item malformed fallback.
    - path: package.json
      content: |
        {
          "name": "demo",
          "version": "0.1.0"
        }
    - path: src/auth.ts
      content: |
        export function verifyToken(token: string): boolean {
          return token === 'expected-token';
        }
  files_staged:
    - path: src/auth.ts
      content: |
        export function verifyToken(token: string): boolean {
          if (token === 'expected-token') return true;
          return false;
        }
    - path: src/handler.ts
      content: |
        import { verifyToken } from './auth';

        export function handle(req: { token: string }) {
          verifyToken(req.token);
          return { status: 200 };
        }

user_responses: []

assertions:
  - id: dispatches-check-validator
    type: tool_called
    tool: Task
    args_match:
      subagent_type: "^general-purpose$"
    weight: 3

  - id: per-item-malformed-warn-line
    type: output_contains
    pattern: "WARN \\[\\+check\\]:\\s+validator response for item \\d+ was malformed,\\s+kept as-is"
    weight: 4

  - id: renders-filtered-summary
    type: output_contains
    pattern: "Filtered:\\s+\\d+\\s+hidden,\\s+\\d+\\s+adjusted,\\s+\\d+\\s+reclassified\\s+by\\s+\\+check"
    weight: 4

  - id: gate-result-block-present
    type: output_contains
    pattern: "```aif-gate-result"
    weight: 3

  - id: warn-before-gate-result
    type: output_contains
    pattern: "WARN \\[\\+check\\][\\s\\S]*```aif-gate-result"
    weight: 3

  - id: not-whole-dispatch-failure
    type: no_output_contains
    pattern: "validator failed"

  - id: stay-in-sandbox
    type: no_path_escape
